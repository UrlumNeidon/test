<!DOCTYPE html>
<html>
<head>
  <title>KSP Orbit Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';

// ===== SCENE =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
camera.position.set(0, 200, 400);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== CONTROLS =====
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ===== LIGHT =====
const light = new THREE.PointLight(0xffffff, 2);
scene.add(light);

// ===== KERBOL =====
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(10, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffaa00 })
);
scene.add(sun);

// ===== SCALE =====
const SCALE = 1 / 10000000;

// ===== PLANETS =====
const planets = [
  { a: 13599840256, e: 0.0, color: 0x00aaff } // Kerbin (test first)
];

// ===== ORBIT FUNCTION =====
function createOrbit(a, e) {
  const points = [];

  for (let t = 0; t < Math.PI * 2; t += 0.01) {
    let r = (a * (1 - e * e)) / (1 + e * Math.cos(t));

    let x = r * Math.cos(t) * SCALE;
    let z = r * Math.sin(t) * SCALE;

    points.push(new THREE.Vector3(x, 0, z));
  }

  const geo = new THREE.BufferGeometry().setFromPoints(points);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x00aaff }));
}

// ===== CREATE =====
const meshes = [];

planets.forEach(p => {
  const orbit = createOrbit(p.a, p.e);
  scene.add(orbit);

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(2, 16, 16),
    new THREE.MeshBasicMaterial({ color: p.color })
  );

  scene.add(mesh);
  meshes.push({ mesh, data: p });
});

// ===== LOOP =====
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  meshes.forEach(obj => {
    const { mesh, data } = obj;

    let r = (data.a * (1 - data.e * data.e)) / (1 + data.e * Math.cos(time));

    mesh.position.set(
      r * Math.cos(time) * SCALE,
      0,
      r * Math.sin(time) * SCALE
    );
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ===== RESIZE =====
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
